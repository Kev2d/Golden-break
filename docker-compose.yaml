version: '3.6'
services:
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${THEME_NAME}_wp
      MYSQL_USER: ${THEME_NAME}
      MYSQL_PASSWORD: ${THEME_NAME}
    networks:
      - wordpress

  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin/phpmyadmin
    restart: no
    ports:
      - 8080:80
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
      UPLOAD_LIMIT: 300M
    networks:
      - wordpress

  wordpress:
    image: wordpress:latest
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${THEME_NAME}
      WORDPRESS_DB_PASSWORD: ${THEME_NAME}
      WORDPRESS_DB_NAME: ${THEME_NAME}_wp
      WORDPRESS_DB_CHARSET: utf8mb4
    depends_on:
      - db
      - mailhog
    restart: no
    ports:
      - 8000:80
    volumes:
      - ./project-assets/${THEME_NAME}:/var/www/html/wp-content/themes/${THEME_NAME}
      - ./project-assets/${THEME_NAME}-child:/var/www/html/wp-content/themes/${THEME_NAME}-child
      - ./project-assets/plugins:/var/www/html/wp-content/plugins
      - ./project-assets/uploads:/var/www/html/wp-content/uploads
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./php.ini:/usr/local/etc/php/php.ini
    networks:
      - wordpress

  redis:
    image: redis:alpine
    networks:
      - wordpress

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - wordpress

networks:
  wordpress:
    name: ${THEME_NAME}

volumes:
  db_data:
